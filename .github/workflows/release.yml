name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.14'
      - name: Verify tag matches pyproject version
        run: |
          version=$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "$version" ]; then
            echo "tag v$tag does not match pyproject version $version" >&2
            exit 1
          fi
      - run: uv sync --locked
      - name: Quality gate
        run: bash scripts/code-quality.sh all
      - name: Build release bundle and checksums
        run: |
          uv run python scripts/release_bundle.py \
            "agentmaster-$GITHUB_REF_NAME.zip" --checksums SHA256SUMS
      - name: Verify checksums
        run: sha256sum --check SHA256SUMS
      - name: Smoke-test the extracted archive
        run: |
          mkdir extracted
          unzip -q "agentmaster-$GITHUB_REF_NAME.zip" -d extracted
          cd extracted
          uv run --no-project python install.py --help
          uv run --no-project python -m agentmaster ledger doctor --help
          uv run --no-project python -m agentmaster ledger init \
            --path "$RUNNER_TEMP/release-smoke-ledger.sqlite3"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "agentmaster-$GITHUB_REF_NAME.zip" SHA256SUMS \
            --generate-notes --verify-tag
