line-length = 90
target-version = "py314"

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "UP",
    "S",
    "ERA",
    "G",
    "ASYNC",
    "PERF",
    "B",
    "TID",
    "SIM",
    "C4",
    "DTZ",
    "PTH",
    "PT",
    "A",
    "LOG",
    "TC",
    "PGH",
    "FURB",
    "RUF",
    "TRY",
    "N",
    "FLY",
    "COM",
    "EXE",
    "PIE",
    "C901",
    "D404",
    "D417",
    "D419",
    "RET",
    "SLF",
    "RSE",
    "PYI",
    "ANN001",
    "ANN201",
    "ANN202",
    "ANN204",
    "ANN205",
    "ANN206",
    "FBT001",
    "FBT002",
]

ignore = [
    "COM812",
    "PGH003",
    "RUF001",
    "RUF002",
    "RUF003",
    "RUF006",
    "RUF012",
    "RUF029",
    "TRY400",
    "TRY003",
    "TRY301",
    "S101",
    "S106",
    "S104",
    "S105",
]

[lint.per-file-ignores]
# tests exercise private helpers and pytest test functions don't annotate returns
"tests/**" = ["SLF001", "ANN"]

[lint.flake8-quotes]
docstring-quotes = "single"

[lint.flake8-type-checking]
exempt-modules = ["typing", "typing_extensions"]
quote-annotations = false
strict = false

[format]
docstring-code-format = true
preview = true
quote-style = "single"
